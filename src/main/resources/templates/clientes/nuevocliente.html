<!DOCTYPE html>
<html lang="es"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/dashboard">

<head>
	<meta charset="UTF-8">
	<title>Nuevo cliente</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">

		<div class="page-header">
			<h3 class="page-title">Nuevo cliente</h3>
		</div>

		<div class="row">

			<div class="col-md-10 grid-margin stretch-card">

				<div class="card">

					<div class="card-body">

						<h4 class="card-title">
							Registrar cliente
						</h4>

						<p class="card-description">
							Ingrese la información del nuevo cliente
						</p>

						<form th:action="@{/clientes/guardar}"
							  th:object="${cliente}"
							  method="post">

							<div class="row">

								<div class="col-md-6">

									<div class="form-group">

										<label for="nombre">Nombre</label>

										<input type="text"
											   id="nombre"
											   th:field="*{nombre}"
											   class="form-control"
											   placeholder="Ingrese el nombre"
											   required>

									</div>

								</div>

								<div class="col-md-6">

									<div class="form-group">

										<label for="apellido">Apellido</label>

										<input type="text"
											   id="apellido"
											   th:field="*{apellido}"
											   class="form-control"
											   placeholder="Ingrese el apellido"
											   required>

									</div>

								</div>

							</div>

							<div class="row">

								<div class="col-md-6">

									<div class="form-group">

										<label for="cedula">Cédula</label>

										<input type="text"
											   id="cedula"
											   th:field="*{cedula}"
											   class="form-control"
											   placeholder="Ingrese la cédula"
											   maxlength="10"
											   required>

									</div>

								</div>

								<div class="col-md-6">

									<div class="form-group">

										<label for="correo">Correo</label>

										<input type="email"
											   id="correo"
											   th:field="*{correo}"
											   class="form-control"
											   placeholder="Ingrese el correo"
											   required>

									</div>

								</div>

							</div>

							<div class="row">

								<div class="col-md-6">

									<div class="form-group">

										<label for="telefono">Teléfono</label>

										<input type="text"
											   id="telefono"
											   th:field="*{telefono}"
											   class="form-control"
											   placeholder="Ingrese el teléfono"
											   maxlength="10"
											   required>

									</div>

								</div>

								<div class="col-md-6">

									<div class="form-group">

										<label for="estado">Estado</label>

										<select id="estado"
												th:field="*{estado}"
												class="form-select">

											<option th:value="true">
												Activo
											</option>

											<option th:value="false">
												Inactivo
											</option>

										</select>

									</div>

								</div>

							</div>

							<div class="form-group">

								<label for="direccion">Dirección</label>

								<textarea id="direccion"
										  th:field="*{direccion}"
										  class="form-control"
										  rows="4"
										  placeholder="Ingrese la dirección"
										  required></textarea>

							</div>

							<button type="submit"
									class="btn btn-gradient-primary me-2">

								<i class="mdi mdi-content-save"></i>
								Guardar

							</button>

							<a th:href="@{/clientes}"
							   class="btn btn-light">

								Cancelar

							</a>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>
</html>
